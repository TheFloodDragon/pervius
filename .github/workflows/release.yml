name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: pervius.exe
            asset_name: pervius-windows-x86_64.exe
          - os: ubuntu-latest
            artifact_name: pervius
            asset_name: pervius-linux-x86_64
          - os: macos-latest
            artifact_name: pervius
            asset_name: pervius-macos-aarch64.zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/src
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libwayland-egl-backend-dev \
            libasound2-dev

      - name: Build
        run: cargo build --release

      - name: Create macOS .app bundle
        if: runner.os == 'macOS'
        run: |
          # Convert .png to .icns
          mkdir -p icon.iconset
          sips -s format png -z 1024 1024 crates/egui-shell/icon.png --out icon.iconset/icon_512x512@2x.png
          sips -s format png -z 512 512 crates/egui-shell/icon.png --out icon.iconset/icon_512x512.png
          sips -s format png -z 256 256 crates/egui-shell/icon.png --out icon.iconset/icon_256x256@2x.png
          sips -s format png -z 256 256 crates/egui-shell/icon.png --out icon.iconset/icon_256x256.png
          sips -s format png -z 128 128 crates/egui-shell/icon.png --out icon.iconset/icon_128x128@2x.png
          sips -s format png -z 128 128 crates/egui-shell/icon.png --out icon.iconset/icon_128x128.png
          iconutil -c icns icon.iconset -o Pervius.icns

          # Build .app bundle
          mkdir -p Pervius.app/Contents/{MacOS,Resources}
          cp target/release/${{ matrix.artifact_name }} Pervius.app/Contents/MacOS/pervius
          chmod +x Pervius.app/Contents/MacOS/pervius
          cp Pervius.icns Pervius.app/Contents/Resources/Pervius.icns

          cat > Pervius.app/Contents/Info.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>pervius</string>
            <key>CFBundleIdentifier</key>
            <string>com.pervius.app</string>
            <key>CFBundleName</key>
            <string>Pervius</string>
            <key>CFBundleDisplayName</key>
            <string>Pervius</string>
            <key>CFBundleVersion</key>
            <string>0.1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>0.1.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleIconFile</key>
            <string>Pervius</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

          codesign --deep --force --sign - --options runtime Pervius.app

      - name: Rename artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            ditto -c -k --sequesterRsrc --keepParent Pervius.app ${{ matrix.asset_name }}
          else
            cp target/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Download

            | Platform | File |
            |----------|------|
            | Windows | `pervius-windows-x86_64.exe` |
            | Linux | `pervius-linux-x86_64` |
            | macOS | `pervius-macos-aarch64.zip` |
            | ClassForge | `classforge-*.jar` |

            ### macOS 首次运行

            macOS Gatekeeper 会拦截未公证的应用，首次打开请执行：

            ```bash
            xattr -cr Pervius.app
            ```
          files: ${{ matrix.asset_name }}
        if: matrix.os == 'windows-latest'

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        if: matrix.os != 'windows-latest'

  classforge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('classforge/**/*.gradle*', 'classforge/gradle/**') }}
          restore-keys: gradle-

      - name: Build classforge
        run: ./gradlew jar
        working-directory: classforge

      - name: Upload classforge to Release
        uses: softprops/action-gh-release@v2
        with:
          files: classforge/build/libs/classforge-*.jar
