name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: pervius.exe
            asset_name: pervius-windows-x86_64.exe
          - os: ubuntu-latest
            artifact_name: pervius
            asset_name: pervius-linux-x86_64
          - os: macos-latest
            artifact_name: pervius
            asset_name: Pervius-macos-aarch64.zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libwayland-egl-backend-dev \
            libasound2-dev

      - name: Build
        run: cargo build --release

      - name: Ad-hoc sign macOS binary
        if: runner.os == 'macOS'
        run: codesign --force --sign - target/release/${{ matrix.artifact_name }}

      - name: Create macOS .app bundle
        if: runner.os == 'macOS'
        run: |
          mkdir -p Pervius.app/Contents/MacOS
          cp target/release/${{ matrix.artifact_name }} Pervius.app/Contents/MacOS/pervius
          chmod +x Pervius.app/Contents/MacOS/pervius
          cat > Pervius.app/Contents/Info.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>pervius</string>
            <key>CFBundleIdentifier</key>
            <string>com.pervius.app</string>
            <key>CFBundleName</key>
            <string>Pervius</string>
            <key>CFBundleDisplayName</key>
            <string>Pervius</string>
            <key>CFBundleVersion</key>
            <string>0.1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>0.1.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF
          codesign --force --sign - Pervius.app

      - name: Rename artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            ditto -c -k --sequesterRsrc --keepParent Pervius.app ${{ matrix.asset_name }}
          else
            cp target/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
